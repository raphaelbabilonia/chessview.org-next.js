name: Deploy ChessView Website

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: chessview-website-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Build standalone website
        env:
          API_BASE_URL: https://api.chessview.org/api
          NEXT_PUBLIC_SITE_URL: https://chessview.org
          NEXT_PUBLIC_TRACKING_ENABLED: "true"
          NEXT_PUBLIC_TRACKING_API_URL: https://api.chessview.org/api/tracking/events
          DEPLOYMENT_VERSION: ${{ github.sha }}
        run: npm run build

      - name: Create deployment package
        run: |
          rm -rf deploy
          mkdir -p deploy/.next
          cp -R .next/standalone/. deploy/
          cp -R .next/static deploy/.next/static
          cp -R public deploy/public

      - name: Setup SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s' '${{ secrets.VPS_SSH_KEY }}' | sed 's/\\n/\n/g' | tr -d '\r' > ~/.ssh/deploy_key
          if [ -s ~/.ssh/deploy_key ] && [ "$(tail -c 1 ~/.ssh/deploy_key | wc -l)" -eq 0 ]; then
            printf '\n' >> ~/.ssh/deploy_key
          fi
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload website package to VPS
        run: |
          SSH_OPTIONS="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=90 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"

          for attempt in 1 2 3; do
            echo "Upload attempt $attempt/3"

            if rsync -avz --timeout=600 -e "ssh $SSH_OPTIONS" \
              --delete \
              deploy/ \
              ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }}:/tmp/chessview-web-deploy/; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "Upload failed after $attempt attempts"
              exit 1
            fi

            sleep $((attempt * 20))
          done

      - name: Deploy website on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 60s
          command_timeout: 15m
          script: |
            set -e

            run_privileged() {
              if [ "$(id -u)" -eq 0 ]; then
                "$@"
              else
                sudo -n "$@"
              fi
            }

            run_as_site_user() {
              if id "$SITE_USER" >/dev/null 2>&1 && [ "$(id -un)" != "$SITE_USER" ]; then
                if [ "$(id -u)" -eq 0 ]; then
                  sudo -H -u "$SITE_USER" bash -lc "$1"
                else
                  sudo -n -H -u "$SITE_USER" bash -lc "$1"
                fi
              else
                bash -lc "$1"
              fi
            }

            APP_NAME="chessview-web"
            SITE_USER="chessview"
            TARGET_DIR="/home/chessview/htdocs/chessview.org"
            TEMP_DIR="/tmp/chessview-web-deploy"
            BACKUP_ROOT="/home/chessview/backups"
            BACKUP_DIR="$BACKUP_ROOT/web-$(date +%Y%m%d-%H%M%S)"
            LOCAL_HEALTH_URL="http://127.0.0.1:3011/en"

            if [ ! -d "$TEMP_DIR" ]; then
              echo "Temporary deploy directory not found: $TEMP_DIR"
              exit 1
            fi

            if [ ! -f "$TEMP_DIR/server.js" ]; then
              echo "Uploaded website package is missing server.js"
              exit 1
            fi

            run_privileged mkdir -p "$TARGET_DIR" "$BACKUP_ROOT"

            if [ -d "$TARGET_DIR" ] && [ "$(find "$TARGET_DIR" -mindepth 1 -maxdepth 1 ! -name '.well-known' 2>/dev/null | head -n 1)" ]; then
              run_privileged mkdir -p "$BACKUP_DIR"
              run_privileged rsync -a --delete --exclude '.well-known' "$TARGET_DIR"/ "$BACKUP_DIR"/
            fi

            run_privileged rsync -av --delete --exclude '.well-known' "$TEMP_DIR"/ "$TARGET_DIR"/
            run_privileged rm -rf "$TEMP_DIR"
            run_privileged mkdir -p "$TARGET_DIR/.well-known"

            cat > /tmp/chessview-web-ecosystem.config.cjs << 'EOF'
            module.exports = {
              apps: [
                {
                  name: "chessview-web",
                  script: "server.js",
                  cwd: "/home/chessview/htdocs/chessview.org",
                  instances: 1,
                  exec_mode: "fork",
                  env: {
                    NODE_ENV: "production",
                    PORT: "3011",
                    HOSTNAME: "127.0.0.1",
                    API_BASE_URL: "https://api.chessview.org/api",
                    NEXT_PUBLIC_SITE_URL: "https://chessview.org",
                    NEXT_PUBLIC_TRACKING_ENABLED: "true",
                    NEXT_PUBLIC_TRACKING_API_URL: "https://api.chessview.org/api/tracking/events"
                  }
                }
              ]
            };
            EOF
            run_privileged mv /tmp/chessview-web-ecosystem.config.cjs "$TARGET_DIR/ecosystem.config.cjs"

            if id "$SITE_USER" >/dev/null 2>&1; then
              run_privileged chown -R "$SITE_USER:$SITE_USER" "$TARGET_DIR" "$BACKUP_ROOT"
            fi

            if ! command -v pm2 >/dev/null 2>&1; then
              run_privileged npm install -g pm2
            fi

            run_as_site_user "cd '$TARGET_DIR' && pm2 startOrReload ecosystem.config.cjs --update-env"
            run_as_site_user "pm2 save || true"

            if [ "$(id -u)" -eq 0 ] && command -v pm2 >/dev/null 2>&1; then
              pm2 startup systemd -u "$SITE_USER" --hp "/home/$SITE_USER" >/dev/null 2>&1 || true
            fi

            LOCAL_STATUS="000"
            for attempt in $(seq 1 20); do
              LOCAL_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "$LOCAL_HEALTH_URL" || echo "000")
              if [ "$LOCAL_STATUS" = "200" ]; then
                break
              fi
              sleep 3
            done

            if [ "$LOCAL_STATUS" != "200" ]; then
              echo "Local website health check failed: $LOCAL_STATUS"
              if [ -d "$BACKUP_DIR" ] && [ "$(find "$BACKUP_DIR" -mindepth 1 -maxdepth 1 2>/dev/null | head -n 1)" ]; then
                echo "Restoring previous website release from $BACKUP_DIR"
                run_privileged rsync -av --delete --exclude '.well-known' "$BACKUP_DIR"/ "$TARGET_DIR"/
                run_as_site_user "cd '$TARGET_DIR' && pm2 startOrReload ecosystem.config.cjs --update-env"
                run_as_site_user "pm2 save || true"
              fi
              exit 1
            fi

            if command -v nginx >/dev/null 2>&1; then
              run_privileged nginx -t
              run_privileged systemctl reload nginx
            fi

            if id "$SITE_USER" >/dev/null 2>&1; then
              run_privileged chown -R "$SITE_USER:$SITE_USER" "$TARGET_DIR" "$BACKUP_ROOT"
            fi

            cd "$BACKUP_ROOT"
            for old_backup in $(ls -dt web-*/ 2>/dev/null | tail -n +6); do
              run_privileged rm -rf "$old_backup"
            done

      - name: Verify public website
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 60s
          command_timeout: 5m
          script: |
            set -e
            PUBLIC_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://chessview.org/en || echo "000")
            echo "https://chessview.org/en => HTTP $PUBLIC_STATUS"
            if [ "$PUBLIC_STATUS" != "200" ]; then
              exit 1
            fi
